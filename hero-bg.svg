<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="xMidYMid slice">

  <defs>

    <!-- Depth blur — Apple Intelligence style soft diffusion -->
    <filter id="mesh-xl">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="mesh-lg">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="mesh-md">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="mesh-sm">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <!-- Very subtle grain texture -->
    <filter id="texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
      <feComponentTransfer in="gray" result="faded">
        <feFuncA type="linear" slope="0.02"/>
      </feComponentTransfer>
      <feComposite operator="in" in="faded" in2="SourceGraphic"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>

  </defs>

  <!-- ════════════════════════════════════════ -->
  <!-- White canvas                             -->
  <!-- ════════════════════════════════════════ -->
  <rect width="1440" height="900" fill="#FCFCFD"/>

  <!-- Ultra-faint grain overlay -->
  <rect width="1440" height="900" fill="#FCFCFD" filter="url(#texture)" opacity="0.6"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Soft organic mesh — blurred blobs         -->
  <!-- ════════════════════════════════════════ -->

  <!-- Far depth — large diffuse gray forms -->
  <g filter="url(#mesh-xl)">
    <ellipse cx="180"  cy="160"  rx="320" ry="260" fill="#EBEDF0" opacity="0.55"/>
    <ellipse cx="1300" cy="120"  rx="280" ry="240" fill="#EBEDF0" opacity="0.45"/>
    <ellipse cx="200"  cy="760"  rx="300" ry="250" fill="#E8EBEE" opacity="0.50"/>
    <ellipse cx="1280" cy="780"  rx="260" ry="220" fill="#EBEDF0" opacity="0.40"/>
  </g>

  <!-- Mid depth — slightly warmer grays, gentle form -->
  <g filter="url(#mesh-lg)">
    <ellipse cx="300"  cy="280"  rx="200" ry="180" fill="#E3E6EC" opacity="0.40"/>
    <ellipse cx="1180" cy="240"  rx="180" ry="200" fill="#E5E7EB" opacity="0.35"/>
    <ellipse cx="160"  cy="580"  rx="190" ry="210" fill="#E3E6EC" opacity="0.38"/>
    <ellipse cx="1320" cy="620"  rx="170" ry="190" fill="#E5E7EB" opacity="0.32"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- Blue-tinted ambient blobs — barely there   -->
  <!-- ════════════════════════════════════════ -->

  <!-- Primary blue whisper — top-left -->
  <g filter="url(#mesh-md)">
    <ellipse cx="220" cy="180" rx="140" ry="120" fill="#DBE4F7" opacity="0.45"/>
    <ellipse cx="160" cy="140" rx="90"  ry="80"  fill="#C5D5F5" opacity="0.30"/>
  </g>

  <!-- Secondary blue whisper — bottom-right -->
  <g filter="url(#mesh-md)">
    <ellipse cx="1240" cy="700" rx="130" ry="110" fill="#DBE4F7" opacity="0.38"/>
    <ellipse cx="1300" cy="740" rx="80"  ry="70"  fill="#C5D5F5" opacity="0.25"/>
  </g>

  <!-- Tiny blue focal points -->
  <g filter="url(#mesh-sm)">
    <ellipse cx="200" cy="120" rx="50" ry="40" fill="#2563EB" opacity="0.08"/>
    <ellipse cx="1260" cy="680" rx="45" ry="38" fill="#2563EB" opacity="0.07"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- Flowing curves — elegant, minimal          -->
  <!-- ════════════════════════════════════════ -->

  <!-- Long gentle arc — top sweep -->
  <g fill="none" stroke="#E5E7EB" stroke-width="0.6">
    <path d="M 0,60 C 200,40 400,100 600,80 C 800,60 1000,100 1200,80 C 1300,70 1400,50 1440,40"/>
  </g>

  <!-- Left flowing curve -->
  <g fill="none" stroke="#E3E6EC" stroke-width="0.5">
    <path d="M 40,200 C 60,300 30,450 70,550 C 110,650 60,750 40,820"/>
  </g>

  <!-- Right flowing curve -->
  <g fill="none" stroke="#E3E6EC" stroke-width="0.5">
    <path d="M 1400,180 C 1380,320 1400,460 1370,560 C 1340,660 1380,760 1400,840"/>
  </g>

  <!-- Bottom edge sweep -->
  <g fill="none" stroke="#E8EBEE" stroke-width="0.5">
    <path d="M 0,840 C 300,860 600,820 900,840 C 1100,860 1300,830 1440,850"/>
  </g>

  <!-- Subtle S-curve mid-left -->
  <g fill="none" stroke="#E8EBEE" stroke-width="0.45">
    <path d="M 60,360 C 120,380 180,320 240,360 C 300,400 360,340 420,380"/>
  </g>

  <!-- Subtle S-curve mid-right -->
  <g fill="none" stroke="#E8EBEE" stroke-width="0.45">
    <path d="M 1380,400 C 1320,420 1260,360 1200,400 C 1140,440 1080,380 1020,420"/>
  </g>

  <!-- Single blue-toned flowing line -->
  <g fill="none" stroke="#2563EB" stroke-width="0.5" opacity="0.12">
    <path d="M 80,280 C 130,260 180,300 230,280 C 280,260 330,300 380,280"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- Very minimal dot anchors — 4 only          -->
  <!-- ════════════════════════════════════════ -->

  <g fill="#D1D5DB" opacity="0.5">
    <circle cx="70"  cy="280" r="2.5"/>
    <circle cx="340" cy="270" r="2.5"/>
    <circle cx="1370" cy="410" r="2.5"/>
    <circle cx="1070" cy="420" r="2.5"/>
  </g>

  <!-- Blue accent dots — just 2 -->
  <g fill="#2563EB" opacity="0.35">
    <circle cx="200" cy="280" r="2"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.6" opacity="0.10">
    <circle cx="200" cy="280" r="6"/>
  </g>

  <g fill="#2563EB" opacity="0.28">
    <circle cx="1240" cy="420" r="2"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.6" opacity="0.09">
    <circle cx="1240" cy="420" r="6"/>
  </g>

</svg>
