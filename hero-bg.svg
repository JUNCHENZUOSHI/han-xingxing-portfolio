  <!-- LAYER 2 · Atmospheric depth (blurred)       -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#blur-xl)">
    <circle cx="180"  cy="140"  r="300" fill="url(#glow-a)"/>
    <circle cx="1280" cy="160"  r="260" fill="url(#glow-a)"/>
    <circle cx="160"  cy="720"  r="280" fill="url(#glow-b)"/>
    <circle cx="1300" cy="740"  r="240" fill="url(#glow-b)"/>
  </g>
  <g filter="url(#blur-lg)">
    <circle cx="120"  cy="420"  r="220" fill="url(#glow-blue-a)"/>
    <circle cx="1340" cy="480"  r="180" fill="url(#glow-blue-b)"/>
  </g>

