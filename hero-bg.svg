<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>

    <!-- Blur filters -->
    <filter id="blur-xl">
      <feGaussianBlur stdDeviation="64"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="0.5" fill="#D1D5DB" opacity="0.35"/>
    </pattern>

    <!-- Subtle glows for atmospheric depth -->
    <radialGradient id="glow-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9CA3AF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9CA3AF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D1D5DB" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D1D5DB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

  </defs>

