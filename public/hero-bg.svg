<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="xMidYMid slice">

  <defs>

    <!-- Atmospheric blur — distance only -->
    <filter id="blur-subtle">
      <feGaussianBlur stdDeviation="100"/>
    </filter>

    <!-- Dot grid — barely visible -->
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="0.35" fill="#D1D5DB" opacity="0.25"/>
    </pattern>

  </defs>

  <!-- ════════════════════════════════════ -->
  <!-- Background                            -->
  <!-- ════════════════════════════════════ -->
  <rect width="1440" height="900" fill="#FAFAFA"/>
  <rect width="1440" height="900" fill="url(#grid)"/>

  <!-- ════════════════════════════════════ -->
  <!-- Depth — ultra soft blurred grays       -->
  <!-- ════════════════════════════════════ -->
  <g filter="url(#blur-subtle)">
    <circle cx="200"  cy="180"  r="280" fill="#E5E7EB" opacity="0.16"/>
    <circle cx="1280" cy="140"  r="240" fill="#E5E7EB" opacity="0.12"/>
    <circle cx="180"  cy="720"  r="260" fill="#E5E7EB" opacity="0.14"/>
    <circle cx="1300" cy="760"  r="200" fill="#E5E7EB" opacity="0.10"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- Topology — thin, sparse, purposeful    -->
  <!-- ════════════════════════════════════ -->
  <g fill="none" stroke="#D1D5DB" stroke-width="0.6">

    <!-- Top-left cluster -->
    <path d="
      M 80,140   L 160,80   L 240,120
      M 160,80   L 160,180
      M 80,140   L 80,220
      M 160,180  L 80,220   L 80,300
      M 160,180  L 240,220  L 280,180
      M 240,120  L 280,180  L 260,280
      M 240,220  L 300,300  L 260,280
      "/>

    <!-- Top-right cluster -->
    <path d="
      M 1360,110 L 1280,70  L 1200,120
      M 1280,70  L 1280,180
      M 1360,110 L 1360,200
      M 1280,180 L 1360,200 L 1380,280
      M 1280,180 L 1200,220 L 1160,180
      M 1200,120 L 1160,180 L 1180,260
      M 1200,220 L 1120,300 L 1180,260
      "/>

    <!-- Bottom-left cluster -->
    <path d="
      M 100,640  L 160,600  L 220,640
      M 160,600  L 160,690
      M 100,640  L 80,720
      M 160,690  L 80,720   L 100,780
      M 160,690  L 240,730  L 280,690
      M 220,640  L 280,690  L 260,770
      M 240,730  L 280,790  L 260,770
      "/>

    <!-- Bottom-right cluster -->
    <path d="
      M 1340,660 L 1280,620 L 1220,670
      M 1280,620 L 1280,710
      M 1340,660 L 1360,740
      M 1280,710 L 1360,740 L 1340,800
      M 1280,710 L 1220,750 L 1160,710
      M 1220,670 L 1160,710 L 1180,790
      M 1220,750 L 1160,790 L 1180,790
      "/>

    <!-- Sparse bridges — just a few -->
    <path d="
      M 80,220   L 80,720
      M 1360,200  L 1360,740
      M 280,180   L 420,120
      M 1160,180  L 1020,120
      M 300,300   L 380,400
      M 1120,300  L 1060,400
      "/>

    <!-- Mid-edge wisps -->
    <path d="
      M 520,100  L 580,140 L 660,110
      M 880,100  L 840,140 L 760,110
      M 420,820  L 500,840 L 580,800
      M 1020,820 L 940,840 L 860,800
      "/>

  </g>

  <!-- ════════════════════════════════════ -->
  <!-- Nodes — small, restrained, geometric   -->
  <!-- ════════════════════════════════════ -->

  <!-- Peripheral dots (r=2) -->
  <g fill="#C7CDD6">
    <!-- Top-left -->
    <circle cx="80" cy="140" r="2"/><circle cx="240" cy="120" r="2"/>
    <circle cx="80" cy="220" r="2"/><circle cx="280" cy="180" r="2"/>
    <circle cx="240" cy="220" r="2"/><circle cx="260" cy="280" r="2"/>
    <circle cx="80" cy="300" r="2"/><circle cx="300" cy="300" r="2"/>

    <!-- Top-right -->
    <circle cx="1360" cy="110" r="2"/><circle cx="1200" cy="120" r="2"/>
    <circle cx="1360" cy="200" r="2"/><circle cx="1160" cy="180" r="2"/>
    <circle cx="1200" cy="220" r="2"/><circle cx="1180" cy="260" r="2"/>
    <circle cx="1380" cy="280" r="2"/><circle cx="1120" cy="300" r="2"/>

    <!-- Bottom-left -->
    <circle cx="100" cy="640" r="2"/><circle cx="220" cy="640" r="2"/>
    <circle cx="80" cy="720" r="2"/><circle cx="280" cy="690" r="2"/>
    <circle cx="240" cy="730" r="2"/><circle cx="260" cy="770" r="2"/>
    <circle cx="100" cy="780" r="2"/><circle cx="280" cy="790" r="2"/>

    <!-- Bottom-right -->
    <circle cx="1340" cy="660" r="2"/><circle cx="1220" cy="670" r="2"/>
    <circle cx="1360" cy="740" r="2"/><circle cx="1160" cy="710" r="2"/>
    <circle cx="1220" cy="750" r="2"/><circle cx="1180" cy="790" r="2"/>
    <circle cx="1340" cy="800" r="2"/><circle cx="1160" cy="790" r="2"/>

    <!-- Mid-edge -->
    <circle cx="520" cy="100" r="2"/><circle cx="580" cy="140" r="2"/>
    <circle cx="660" cy="110" r="2"/><circle cx="880" cy="100" r="2"/>
    <circle cx="840" cy="140" r="2"/><circle cx="760" cy="110" r="2"/>
    <circle cx="420" cy="820" r="2"/><circle cx="500" cy="840" r="2"/>
    <circle cx="580" cy="800" r="2"/><circle cx="1020" cy="820" r="2"/>
    <circle cx="940" cy="840" r="2"/><circle cx="860" cy="800" r="2"/>
    <circle cx="420" cy="120" r="2"/><circle cx="1020" cy="120" r="2"/>
    <circle cx="380" cy="400" r="2"/><circle cx="1060" cy="400" r="2"/>
  </g>

  <!-- Hub nodes (r=3) -->
  <g fill="#AEB5C0">
    <circle cx="160" cy="80" r="3"/><circle cx="160" cy="180" r="3"/>
    <circle cx="1280" cy="70" r="3"/><circle cx="1280" cy="180" r="3"/>
    <circle cx="160" cy="600" r="3"/><circle cx="160" cy="690" r="3"/>
    <circle cx="1280" cy="620" r="3"/><circle cx="1280" cy="710" r="3"/>
  </g>

  <!-- Hollow ring nodes (r=4.5) -->
  <g fill="none" stroke="#C7CDD6" stroke-width="0.9">
    <circle cx="300" cy="300" r="4.5"/><circle cx="1120" cy="300" r="4.5"/>
    <circle cx="280" cy="790" r="4.5"/><circle cx="1160" cy="790" r="4.5"/>
    <circle cx="580" cy="140" r="4"/><circle cx="500" cy="840" r="4"/>
  </g>

  <!-- Diamonds -->
  <g fill="#C7CDD6" opacity="0.7">
    <rect x="157" y="77" width="5" height="5" transform="rotate(45,160,80)"/>
    <rect x="1277" y="67" width="5" height="5" transform="rotate(45,1280,70)"/>
    <rect x="157" y="597" width="5" height="5" transform="rotate(45,160,600)"/>
    <rect x="1277" y="617" width="5" height="5" transform="rotate(45,1280,620)"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- Blue accents — just 3, barely there    -->
  <!-- ════════════════════════════════════ -->

  <!-- Top-left hub marker -->
  <g fill="#2563EB" opacity="0.55">
    <circle cx="160" cy="80" r="4.5"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.8" opacity="0.14">
    <circle cx="160" cy="80" r="8"/>
  </g>

  <!-- Bottom-right hub marker -->
  <g fill="#2563EB" opacity="0.45">
    <circle cx="1280" cy="710" r="4"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.8" opacity="0.12">
    <circle cx="1280" cy="710" r="7"/>
  </g>

  <!-- Mid-edge small accent -->
  <g fill="#2563EB" opacity="0.4">
    <circle cx="580" cy="140" r="3.5"/>
  </g>

  <!-- Blue accent lines — just 4 -->
  <g fill="none" stroke="#2563EB" stroke-width="0.6" opacity="0.16">
    <path d="M 160,80 L 80,140"/>
    <path d="M 160,80 L 240,120"/>
    <path d="M 1280,710 L 1340,660"/>
    <path d="M 1280,710 L 1220,670"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- Editorial framing — near-invisible     -->
  <!-- ════════════════════════════════════ -->
  <g fill="none" stroke="#E5E7EB" stroke-width="0.5" opacity="0.35">
    <path d="M 56,66 L 56,56 L 66,56"/>
    <path d="M 1384,834 L 1384,844 L 1374,844"/>
  </g>

</svg>
