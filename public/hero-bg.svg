<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="xMidYMid slice">

  <defs>

    <!-- Soft depth blur -->
    <filter id="depth">
      <feGaussianBlur stdDeviation="90"/>
    </filter>

    <!-- Faint dot matrix -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.3" fill="#D1D5DB" opacity="0.22"/>
    </pattern>

  </defs>

  <!-- Canvas -->
  <rect width="1440" height="900" fill="#FBFBFC"/>
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Depth — two ultra-soft gray areas, barely there -->
  <g filter="url(#depth)">
    <ellipse cx="260" cy="200" rx="300" ry="240" fill="#E5E7EB" opacity="0.18"/>
    <ellipse cx="1220" cy="720" rx="260" ry="200" fill="#E5E7EB" opacity="0.14"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Topology — AI → System → Growth → Scale          -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- ── Gray topology lines — thin, deliberate ── -->
  <g fill="none" stroke="#D1D5DB" stroke-width="0.5" opacity="0.45">

    <!-- Cluster A: AI (top-left, delicate) -->
    <path d="
      M 100,120  L 160,80   L 220,100
      M 160,80   L 160,160
      M 100,120  L 100,200
      M 160,160  L 100,200  L 80,260
      M 160,160  L 220,200  L 260,160
      M 220,100  L 260,160
    "/>

    <!-- Cluster B: Complex System (top-right, structured mesh) -->
    <path d="
      M 1320,100 L 1260,70  L 1180,100
      M 1260,70  L 1260,170
      M 1320,100 L 1320,200
      M 1260,170 L 1320,200 L 1360,260
      M 1260,170 L 1180,220 L 1140,180
      M 1180,100 L 1140,180 L 1160,260
      M 1180,220 L 1100,280 L 1160,260
    "/>

    <!-- Cluster C: Business Growth (bottom-left, expanding) -->
    <path d="
      M 80,640   L 140,600  L 200,620
      M 140,600  L 140,690
      M 80,640   L 60,710
      M 140,690  L 80,710   L 80,770
      M 140,690  L 220,720  L 260,680
      M 200,620  L 260,680  L 260,760
      M 220,720  L 280,780  L 260,760
    "/>

    <!-- Cluster D: Scalable Experience (bottom-right, open mesh) -->
    <path d="
      M 1340,660 L 1260,610 L 1200,650
      M 1260,610 L 1260,710
      M 1340,660 L 1360,730
      M 1260,710 L 1360,730 L 1340,790
      M 1260,710 L 1200,740 L 1160,700
      M 1200,650 L 1160,700 L 1180,770
      M 1200,740 L 1160,780 L 1180,770
    "/>

    <!-- Bridges: horizontal span across the system -->
    <path d="
      M 260,160  L 440,120
      M 1140,180 L 960,120
      M 80,260   L 80,710
      M 1360,260 L 1360,730
      M 260,680  L 440,680
      M 1160,700 L 960,680
    "/>

    <!-- Mid-edge wisps — subtle horizontal tension -->
    <path d="
      M 500,110  L 580,160 L 660,120 L 740,150
      M 860,120  L 800,160 L 720,120 L 640,150
      M 460,780  L 540,820 L 620,790 L 690,810
      M 960,790  L 880,820 L 800,790 L 720,810
    "/>

  </g>

  <!-- ── Blue topology lines — only at key connection points, opacity 0.2–0.35 ── -->
  <g fill="none" stroke="#2563EB" stroke-width="0.6">

    <!-- AI cluster blue star -->
    <g opacity="0.3">
      <path d="M 160,80 L 100,120"/>
      <path d="M 160,80 L 220,100"/>
    </g>

    <!-- System cluster blue mesh -->
    <g opacity="0.25">
      <path d="M 1260,170 L 1320,200"/>
      <path d="M 1260,170 L 1180,220"/>
    </g>

    <!-- Growth → Scale bridge — the through-line -->
    <g opacity="0.2">
      <path d="M 140,690 L 80,710"/>
      <path d="M 1260,610 L 1260,710"/>
    </g>

  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Nodes                                              -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Peripheral dots (r=1.8) -->
  <g fill="#D1D5DB" opacity="0.5">
    <!-- Cluster A -->
    <circle cx="100" cy="120" r="1.8"/>
    <circle cx="220" cy="100" r="1.8"/>
    <circle cx="100" cy="200" r="1.8"/>
    <circle cx="260" cy="160" r="1.8"/>
    <circle cx="220" cy="200" r="1.8"/>
    <circle cx="80"  cy="260" r="1.8"/>

    <!-- Cluster B -->
    <circle cx="1320" cy="100" r="1.8"/>
    <circle cx="1180" cy="100" r="1.8"/>
    <circle cx="1320" cy="200" r="1.8"/>
    <circle cx="1140" cy="180" r="1.8"/>
    <circle cx="1180" cy="220" r="1.8"/>
    <circle cx="1160" cy="260" r="1.8"/>
    <circle cx="1360" cy="260" r="1.8"/>
    <circle cx="1100" cy="280" r="1.8"/>

    <!-- Cluster C -->
    <circle cx="80"  cy="640" r="1.8"/>
    <circle cx="200" cy="620" r="1.8"/>
    <circle cx="60"  cy="710" r="1.8"/>
    <circle cx="260" cy="680" r="1.8"/>
    <circle cx="220" cy="720" r="1.8"/>
    <circle cx="260" cy="760" r="1.8"/>
    <circle cx="80"  cy="770" r="1.8"/>
    <circle cx="280" cy="780" r="1.8"/>

    <!-- Cluster D -->
    <circle cx="1340" cy="660" r="1.8"/>
    <circle cx="1200" cy="650" r="1.8"/>
    <circle cx="1360" cy="730" r="1.8"/>
    <circle cx="1160" cy="700" r="1.8"/>
    <circle cx="1200" cy="740" r="1.8"/>
    <circle cx="1180" cy="770" r="1.8"/>
    <circle cx="1340" cy="790" r="1.8"/>
    <circle cx="1160" cy="780" r="1.8"/>

    <!-- Mid-edge -->
    <circle cx="440" cy="120" r="1.8"/>
    <circle cx="960" cy="120" r="1.8"/>
    <circle cx="440" cy="680" r="1.8"/>
    <circle cx="960" cy="680" r="1.8"/>
    <circle cx="580" cy="160" r="1.8"/>
    <circle cx="660" cy="120" r="1.8"/>
    <circle cx="740" cy="150" r="1.8"/>
    <circle cx="800" cy="160" r="1.8"/>
    <circle cx="720" cy="120" r="1.8"/>
    <circle cx="640" cy="150" r="1.8"/>
    <circle cx="540" cy="820" r="1.8"/>
    <circle cx="620" cy="790" r="1.8"/>
    <circle cx="690" cy="810" r="1.8"/>
    <circle cx="880" cy="820" r="1.8"/>
    <circle cx="800" cy="790" r="1.8"/>
    <circle cx="720" cy="810" r="1.8"/>
  </g>

  <!-- Hub nodes (r=3) — cluster centers -->
  <g fill="#B0B7C4" opacity="0.6">
    <circle cx="160" cy="80"  r="3"/>
    <circle cx="160" cy="160" r="3"/>
    <circle cx="1260" cy="70"  r="3"/>
    <circle cx="1260" cy="170" r="3"/>
    <circle cx="140" cy="600" r="3"/>
    <circle cx="140" cy="690" r="3"/>
    <circle cx="1260" cy="610" r="3"/>
    <circle cx="1260" cy="710" r="3"/>
  </g>

  <!-- Ring nodes (hollow, r=4.5) — geometric variety -->
  <g fill="none" stroke="#C7CDD6" stroke-width="0.8" opacity="0.5">
    <circle cx="260" cy="160" r="4.5"/>
    <circle cx="1100" cy="280" r="4.5"/>
    <circle cx="260" cy="680" r="4.5"/>
    <circle cx="1160" cy="700" r="4.5"/>
    <circle cx="580" cy="160" r="4"/>
    <circle cx="540" cy="820" r="4"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Blue accent nodes — only 4, restraint           -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Primary: AI cluster center -->
  <g fill="#2563EB" opacity="0.45">
    <circle cx="160" cy="80" r="4.5"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.7" opacity="0.13">
    <circle cx="160" cy="80" r="8"/>
  </g>

  <!-- Secondary: System mesh key node -->
  <g fill="#2563EB" opacity="0.35">
    <circle cx="1260" cy="170" r="4"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.7" opacity="0.10">
    <circle cx="1260" cy="170" r="7"/>
  </g>

  <!-- Tertiary: Growth inflection point -->
  <g fill="#2563EB" opacity="0.3">
    <circle cx="140" cy="690" r="3.5"/>
  </g>

  <!-- Quaternary: Scale output marker -->
  <g fill="#2563EB" opacity="0.35">
    <circle cx="1260" cy="610" r="3.5"/>
  </g>
  <g fill="none" stroke="#2563EB" stroke-width="0.6" opacity="0.10">
    <circle cx="1260" cy="610" r="7"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Editorial framing — whisper only                -->
  <!-- ═══════════════════════════════════════════════ -->
  <g fill="none" stroke="#E5E7EB" stroke-width="0.5" opacity="0.3">
    <path d="M 56,66 L 56,56 L 66,56"/>
    <path d="M 1384,834 L 1384,844 L 1374,844"/>
  </g>

  <!-- Three-dot cluster — editorial anchor, top-right -->
  <g fill="#D1D5DB" opacity="0.35">
    <circle cx="1368" cy="64" r="1.2"/>
    <circle cx="1376" cy="64" r="1.2"/>
    <circle cx="1384" cy="64" r="1.2"/>
  </g>

</svg>
