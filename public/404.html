<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Store the attempted URL, then redirect to root
    // The SPA will read this and restore the path
    var path = location.pathname.replace(/\/$/, '');
    sessionStorage.setItem('redirect', path);
    location.replace('/han-xingxing-portfolio/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
